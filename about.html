<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Luxury Bag Store</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-300">

<!-- 👜 Navbar -->
<nav class="bg-black text-white p-4">
  <div class="container mx-auto flex justify-between items-center">

    <h1 class="text-xl font-bold">👜 Luxury Bag Store</h1>

    <div class="space-x-4 text-sm">
      <a href="index.html" class="hover:text-yellow-400">Home</a>
      <a href="products.html" class="hover:text-yellow-400">Products</a>
      <a href="contact.html" class="hover:text-yellow-400">Contact</a>
    </div>

  </div>
</nav>

<!-- ✨ Header -->
<section class="text-center py-12">
  <h2 class="text-4xl font-bold">Contact Us</h2>
  <p class="text-gray-600 mt-2">ติดต่อเราเพื่อสอบถามข้อมูลสินค้า</p>
</section>

<!-- 📦 Layout -->
<section class="container mx-auto px-4 pb-16 grid md:grid-cols-2 gap-8">

  <!-- 💎 Contact Info -->
  <div class="bg-black text-white p-8 rounded-2xl shadow-xl">

    <h3 class="text-2xl font-bold mb-4">📞 Contact Info</h3>

    <p class="mb-3">📍 Bangkok, Thailand</p>
    <p class="mb-3">📧 luxurybag@email.com</p>
    <p class="mb-3">📱 099-999-9999</p>

    <div class="mt-6 text-yellow-400 font-bold">
      “Luxury is not a style, it’s an attitude.”
    </div>

  </div>

  <!-- 📝 Form -->
  <div class="bg-white p-8 rounded-2xl shadow-xl">

    <h3 class="text-2xl font-bold mb-6">Send Message</h3>

    <form class="space-y-4">

      <input
        type="text"
        placeholder="ชื่อของคุณ"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">

      <input
        type="email"
        placeholder="อีเมล"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">

      <textarea
        rows="5"
        placeholder="ข้อความของคุณ"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400"></textarea>

      <button
        class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">
        Send Message ✉️
      </button>

    </form>

  </div>

</section>

<!-- Footer -->
<footer class="bg-black text-white text-center p-6">
  © 2026 Luxury Bag Store
</footer>

</body>
</html>
