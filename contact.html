<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-blue-600 text-white p-4 flex justify-between">
  <span class="font-bold">MyShop</span>
  <div class="space-x-4">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- Form -->
<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">ติดต่อเรา</h1>

  <div class="bg-white p-4 rounded-xl shadow max-w-md">
    <input class="border p-2 w-full mb-2" placeholder="ชื่อ">
    <input class="border p-2 w-full mb-2" placeholder="อีเมล">

    <button onclick="openModal()" class="bg-blue-500 text-white px-4 py-2 rounded">
      ส่งข้อมูล
    </button>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
  <div class="bg-white p-6 rounded-xl">
    <p>ส่งข้อมูลเรียบร้อย ✅</p>
    <button onclick="closeModal()" class="mt-2 bg-red-500 text-white px-3 py-1 rounded">
      ปิด
    </button>
  </div>
</div>

<script>
function openModal() {
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}
</script>

</body>
</html>
