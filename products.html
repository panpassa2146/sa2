<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bag Collection</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<!-- 👜 Navbar -->
<nav class="bg-black text-white p-4">
  <div class="container mx-auto flex justify-between items-center">

    <h1 class="text-xl font-bold">👜 Bag Collection</h1>

    <div class="space-x-4 text-sm">
      <a href="index.html" class="hover:text-yellow-400">Home</a>
      <a href="products.html" class="hover:text-yellow-400">Products</a>

<!-- 🛍 Title -->
<section class="text-center py-10">

</section>

    <!-- 1 -->

      <div class="p-4">

        <p class="text-gray-500 text-sm">กระเป๋าหนังแท้ เรียบหรู</p>

      </div>

    <!-- 2 -->
    <div class="bg-white rounded-xl shadow-md hover:shadow-xl transition overflow-hidden">

      <div class="p-4">
        <h3 class="font-bold text-lg">Fashion Handbag</h3>

        <button class="mt-3 w-full bg-black text-white py-2 rounded hover:bg-gray-800">

        </button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-md hover:shadow-xl transition overflow-hidden">

      <div class="p-4">
        <h3 class="font-bold text-lg">Premium Backpack</h3>
        <p class="text-gray-500 text-sm">กระเป๋าเป้ ใช้งานอเนกประสงค์</p>

        <button class="mt-3 w-full bg-black text-white py-2 rounded hover:bg-gray-800">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- 4 -->
    <div class="bg-white rounded-xl shadow-md hover:shadow-xl transition overflow-hidden">
      <img src="https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d"
        class="w-full h-48 object-cover">

      <div class="p-4">
        <h3 class="font-bold text-lg">Travel Bag</h3>
        <p class="text-gray-500 text-sm">กระเป๋าเดินทาง ทนทาน</p>
        <div class="mt-2 text-yellow-600 font-bold">฿1,890</div>

        <button class="mt-3 w-full bg-black text-white py-2 rounded hover:bg-gray-800">

        </button>
